apply plugin: 'com.android.application'

android {
    namespace 'com.example.busoffline'
    compileSdk 33

    defaultConfig {
        applicationId "com.example.busoffline"
        // minSdk 19 = Android 4.4 (KitKat) - deliberately low so this installs
        // on older / locked-down Android builds like the one used on the Fig device.
        // Lower this further (e.g. 16) if the developer says the device is older still.
        minSdk 19
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // No external libraries needed - org.json is built into the Android SDK.
}
